name: refresh-stats

# Daily refresh of per-theme install counts (jsDelivr) and last-modified dates.
# Enrich-only — it does not regenerate the registry from manifests (pushes do
# that) and does not touch generatedAt, so it commits only when a count or date
# actually changed. Shares the build-registry concurrency group so the two never
# run at once.

on:
  schedule:
    - cron: '17 4 * * *' # daily, off-peak UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # per-theme git dates + the HEAD:registry.json fallback
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh install counts + dates
        run: node scripts/enrich-registry-stats.mjs
      - name: Commit & purge if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: refresh registry stats [skip ci]"
            git push
            curl -sS -X POST https://purge.jsdelivr.net/ \
              -H 'Content-Type: application/json' \
              -d '{"path":["/gh/Psysonic/psysonic-themes@main/registry.json"]}' || true
          else
            echo "no stat changes"
          fi
