name: build-registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Regenerate registry.json
        run: node scripts/build-registry.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain registry.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: rebuild registry [skip ci]"
            git push
          else
            echo "registry.json unchanged"
          fi
