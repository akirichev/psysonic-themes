name: build-registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'
      - 'registry.json'

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Normalise thumbnails to WebP
        # Convert any PNG/JPG upload to the canonical 16:9 thumbnail.webp and
        # drop the source, so contributors can upload a plain screenshot.
        run: node scripts/make-webp.mjs --themes themes
      - name: Regenerate registry.json
        # Reads each manifest and derives updatedAt from git history (needs the
        # full clone fetched above).
        run: node scripts/build-registry.mjs
      - name: Commit if changed
        # Two theme merges close together spawn concurrent runs; the one checked
        # out on the older main loses the push race (non-fast-forward). On a
        # rejected push, sync with origin/main, rebuild against whatever landed
        # meanwhile, and retry so registry.json stays complete instead of failing.
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: rebuild registry + normalise thumbnails [skip ci]"
          for attempt in $(seq 1 5); do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); syncing with origin/main and rebuilding"
            git reset --hard HEAD^
            git pull --rebase origin main
            node scripts/make-webp.mjs --themes themes
            node scripts/build-registry.mjs
            if [ -z "$(git status --porcelain)" ]; then
              echo "registry already complete after sync"
              exit 0
            fi
            git add -A
            git commit -m "chore: rebuild registry + normalise thumbnails [skip ci]"
          done
          echo "::error::push still rejected after 5 attempts"
          exit 1
