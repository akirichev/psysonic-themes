name: build-registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'
      - 'registry.json'

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Normalise thumbnails to WebP
        # Convert any PNG/JPG upload to the canonical 16:9 thumbnail.webp and
        # drop the source, so contributors can upload a plain screenshot.
        run: node scripts/make-webp.mjs --themes themes
      - name: Regenerate registry.json
        # Reads each manifest and derives updatedAt from git history (needs the
        # full clone fetched above).
        run: node scripts/build-registry.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: rebuild registry + normalise thumbnails [skip ci]"
            git push
          else
            echo "nothing to commit"
          fi
